# AcerHelper — grant the "wheel" group read+write on the laptop-control sysfs knobs, so the app runs
# unprivileged. Applied at boot by systemd-tmpfiles-setup, and immediately by `systemd-tmpfiles --create`.
# tmpfiles (not udev) drives ALL of these: every node is a laptop built-in present at boot, so there's no
# hotplug to handle, and `z` reliably follows the intermediate /sys/class/* device symlinks to chmod the
# real attribute (verified on the Latitude 5540). Only the specific attributes the app uses are listed.
# Edit "wheel" to another group if desired.

# Performance/thermal profile (ACPI)
z /sys/firmware/acpi/platform_profile 0664 root wheel - -

# Battery charge mode + custom charge thresholds (power_supply; Dell dell-laptop / dell-wmi-ddv, kernel 6.12+)
z /sys/class/power_supply/BAT*/charge_types 0664 root wheel - -
z /sys/class/power_supply/BAT*/charge_control_start_threshold 0664 root wheel - -
z /sys/class/power_supply/BAT*/charge_control_end_threshold 0664 root wheel - -

# Keyboard backlight (kernel LED class): brightness + auto-off timeout
z /sys/class/leds/*kbd_backlight/brightness 0664 root wheel - -
z /sys/class/leds/*kbd_backlight/stop_timeout 0664 root wheel - -

# Dell BIOS attributes (dell-wmi-sysman): current_value is root-only even to READ by default
z /sys/class/firmware-attributes/dell-wmi-sysman/attributes/FnLock/current_value 0664 root wheel - -
z /sys/class/firmware-attributes/dell-wmi-sysman/attributes/UsbPowerShare/current_value 0664 root wheel - -
