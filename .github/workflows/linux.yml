name: linux

# Linux build: one self-contained single-file binary, packaged TWO ways from the same publish output —
#   • RPM (bundles the udev/tmpfiles permission rules; for dnf/COPR native installs), and
#   • AppImage (portable, self-updating in $HOME — the fit for immutable/atomic systems; its udev rules are
#     installed on first run by the in-app "Grant hardware access" pkexec action, since a portable binary
#     can't ship system files).
# Built in a Fedora container for rpmbuild + the systemd-rpm-macros the spec uses.

on:
  push:
  workflow_dispatch:

jobs:
  package:
    name: RPM + AppImage
    runs-on: ubuntu-latest
    container: fedora:41
    permissions:
      contents: write        # attach the RPM + AppImage to the GitHub Release on a version tag
    steps:
      - uses: actions/checkout@v7

      # setup-dotnet downloads the SDK; the .NET runtime needs ICU. rpm-build + systemd-rpm-macros give
      # rpmbuild and the %{_udevrulesdir}/%{_tmpfilesdir} macros the spec uses; curl fetches appimagetool.
      - name: Install build deps
        run: dnf -y install rpm-build systemd-rpm-macros libicu tar gzip findutils curl

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish (self-contained single-file, JIT)
        run: >
          dotnet publish AcerHelper.csproj
          -c Release
          -f net10.0
          -r linux-x64
          --self-contained true
          -p:PublishSingleFile=true
          -o publish-linux

      - name: Assemble RPM sources
        run: |
          VER=$(grep -oPm1 '(?<=<Version>)[^<]+' AcerHelper.csproj)
          echo "VER=$VER" >> "$GITHUB_ENV"
          mkdir -p ~/rpmbuild/SOURCES
          rm -f publish-linux/*.pdb
          tar -czf ~/rpmbuild/SOURCES/acer-helper-"$VER"-linux-x64.tar.gz -C publish-linux .
          cp packaging/60-acer-helper.rules packaging/acer-helper.conf packaging/acer-helper.desktop ~/rpmbuild/SOURCES/

      - name: Build RPM
        run: rpmbuild -bb --define "appversion $VER" packaging/acer-helper.spec

      - name: Upload RPM
        uses: actions/upload-artifact@v7
        with:
          name: acer-helper-rpm
          path: ~/rpmbuild/RPMS/*/*.rpm
          if-no-files-found: error

      # AppImage from the same publish output. The udev rules are BUNDLED into the AppDir (the app installs
      # them on first run via pkexec). appimagetool is run with --appimage-extract-and-run (no FUSE needed
      # in the container).
      - name: Build AppImage
        run: |
          AD=AcerHelper.AppDir
          mkdir -p "$AD"
          cp publish-linux/AcerHelper "$AD/AcerHelper" && chmod +x "$AD/AcerHelper"
          install -m0755 packaging/AppRun "$AD/AppRun"
          cp packaging/acer-helper.desktop "$AD/"
          cp packaging/acer-helper.png "$AD/"
          cp packaging/60-acer-helper.rules packaging/acer-helper.conf "$AD/"
          curl -fsSL -o appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run "$AD" AcerHelper-x86_64.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: AcerHelper-AppImage
          path: AcerHelper-x86_64.AppImage
          if-no-files-found: error

      # On a version tag (v*), attach the RPM + AppImage to the GitHub Release the Windows workflow created
      # for the tag (the feed the in-app update check + AppImage self-update read). Stage the RPM into the
      # workspace so the action's glob finds it.
      - name: Stage RPM for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: cp ~/rpmbuild/RPMS/*/*.rpm .
      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.rpm
            AcerHelper-x86_64.AppImage
