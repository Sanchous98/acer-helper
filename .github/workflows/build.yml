name: build

# One workflow, two jobs that run IN PARALLEL (GitHub parallelises jobs; steps within a job are sequential):
#   • windows — Native-AOT AcerHelper.exe + a WiX MSI installer
#   • linux   — Native-AOT binary packaged as a self-updating AppImage
# Both are Native AOT (analyzer clean, 0 IL30xx on both TFMs). Each job attaches its output to the GitHub
# Release (the feed the in-app update check + AppImage self-update read). They stay separate jobs (not one
# matrix) because WiX only builds on Windows and the AppImage/AOT-link uses a Fedora container.
#
# RUNS ONLY on a v* tag: a build's sole purpose is to produce a release, so plain pushes to master don't
# build (no point building the same commit twice — once on the branch push, once on the tag). The release
# assets ARE the deliverable, so there are no separate upload-artifact steps. workflow_dispatch is kept for a
# manual build-only smoke test off a branch (the tag-guarded verify/release steps just skip there).
#
# AOT is safe here: WMI via source-generated COM interop ([GeneratedComInterface], raw VARIANT/SAFEARRAY),
# NOT System.Management (classic COM interop AOT can't do); HidSharp is rooted (TrimmerRootAssembly) so RGB
# survives trimming. WiX 5 is pinned to avoid the paid OSMF-EULA that WiX 6/7 require.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  windows:
    name: AcerHelper.exe + MSI
    runs-on: windows-2022
    permissions:
      contents: write        # create/attach to the GitHub Release on a version tag
    steps:
      - uses: actions/checkout@v7

      # Guard the in-app update check: it compares the GitHub release tag against the version baked into the
      # binary (AppInfo.Version, generated from csproj <Version>). If a v* tag is pushed WITHOUT bumping
      # <Version>, the shipped build advertises a lower version than its own release tag and every client is
      # offered a perpetual "update" to the build it already runs (and WiX MajorUpgrade won't replace the prior
      # install because ProductVersion — also from <Version> — didn't rise). Fail fast before building.
      - name: Verify tag matches csproj <Version>
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          # Anchor on </Version> so we match ONLY the real element, not the literal "<Version>" that appears in
          # this file's own explanatory comments.
          $ver = [regex]::Match((Get-Content AcerHelper.csproj -Raw), '<Version>([^<]+)</Version>').Groups[1].Value
          $tag = '${{ github.ref_name }}'.TrimStart('v')
          if ($ver -ne $tag) { throw "Release tag v$tag does not match csproj <Version> ($ver). Bump <Version> to $tag before tagging." }
          Write-Host "OK: tag matches <Version> = $ver"

      # Cache the NuGet global-packages folder. The heavy restore cost here is the Native-AOT toolchain
      # (Microsoft.DotNet.ILCompiler + the win-x64 runtime pack) plus Avalonia/HidSharp/CommunityToolkit and the
      # WiX tool package — all immutable, versioned packages, so caching them is safe. Keyed on the csproj (the
      # PackageReferences live there); the restore-keys fallback keeps the cache warm even when only <Version>
      # changed for a release, so restore still finds every package and downloads nothing new.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish (self-contained, Native AOT)
        run: >
          dotnet publish AcerHelper.csproj
          -c Release
          -f net10.0-windows
          -r win-x64
          --self-contained true
          -p:PublishAot=true
          -o publish

      # Installer: WiX MSI (packaging/AcerHelper.wxs) — harvests publish/ into Program Files + a Start-menu
      # shortcut + uninstaller. Version read from the csproj. (Native AOT + Avalonia is NOT single-file:
      # Skia/HarfBuzz/ANGLE ship as native DLLs next to the exe — libSkiaSharp.dll, libHarfBuzzSharp.dll,
      # av_libGLESv2.dll, libEGL.dll, … — which the WiX harvest below bundles alongside it; the .pdb is dropped.)
      - name: Build MSI (WiX)
        shell: pwsh
        run: |
          Remove-Item publish\*.pdb -ErrorAction SilentlyContinue
          dotnet tool install --global wix --version 5.0.2
          # Anchor on </Version> so a "<Version>" mention in a csproj comment can't be picked up instead.
          $ver = [regex]::Match((Get-Content AcerHelper.csproj -Raw), '<Version>([^<]+)</Version>').Groups[1].Value
          # Absolute PublishDir: WiX resolves a relative <Files Include> against the .wxs folder (packaging\),
          # not the repo root, so a bare "publish" harvested nothing -> an empty ~32 KB MSI.
          wix build packaging\AcerHelper.wxs -arch x64 -d Version=$ver -d "PublishDir=$PWD\publish" -o AcerHelper-Setup.msi

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: AcerHelper-Setup.msi

  linux:
    name: AppImage (Native AOT)
    runs-on: ubuntu-latest
    container: fedora:41
    permissions:
      contents: write        # attach the AppImage to the GitHub Release on a version tag
    steps:
      - uses: actions/checkout@v7

      # Same guard as the windows job: a v* tag pushed without bumping csproj <Version> would ship an AppImage
      # whose baked-in AppInfo.Version is below its own release tag, perpetually offering an "update" to itself.
      - name: Verify tag matches csproj <Version>
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Anchor on </Version> (lookahead) so we match ONLY the real element, not the literal "<Version>" that
          # appears in this file's own explanatory comments — grep -o would otherwise emit every occurrence.
          ver=$(grep -oP '<Version>\K[^<]+(?=</Version>)' AcerHelper.csproj | head -1)
          tag="${GITHUB_REF_NAME#v}"
          if [ "$ver" != "$tag" ]; then echo "Release tag v$tag does not match csproj <Version> ($ver). Bump <Version> to $tag before tagging."; exit 1; fi
          echo "OK: tag matches <Version> = $ver"

      # actions/cache needs tar (+ zstd for fast compression) INSIDE the container, and the minimal fedora image
      # ships neither — install them first (tiny, uncached) so the cache steps below can pack/unpack.
      - name: Bootstrap cache tools
        run: dnf -y install tar gzip zstd

      # Cache the NuGet global-packages folder — same heavy toolchain restore as the windows job (ILCompiler +
      # the linux-x64 runtime pack) plus Avalonia/etc. See that job for the keying rationale.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      # Cache the downloaded dnf RPMs (clang — the AOT compiler/linker — is the heavy one). keepcache=1 on the
      # install below keeps the .rpm files in /var/cache/dnf so this cache can hold them; on a hit dnf installs
      # from disk instead of re-fetching. Bump the key suffix when the package list below changes.
      - name: Cache dnf packages
        uses: actions/cache@v4
        with:
          path: /var/cache/dnf
          key: fedora41-dnf-v1
          restore-keys: fedora41-dnf-

      # Cache appimagetool (continuous) so we don't re-fetch it from GitHub on every build — also removes a
      # network dependency that has flaked before. Static key = pinned; bump it to pick up a newer appimagetool.
      - name: Cache appimagetool
        uses: actions/cache@v4
        with:
          path: appimagetool
          key: appimagetool-continuous-x86_64

      # Native AOT needs a C toolchain + zlib to link the native image; the runtime needs ICU; curl fetches
      # appimagetool (when not cached); `file` is REQUIRED by appimagetool to inspect the AppDir (the minimal
      # fedora container omits it — it aborts with "file command is missing but required"). (clang is .NET's
      # documented AOT compiler; zlib-devel for the link.) keepcache=1 so the RPMs persist into the cache above.
      - name: Install build deps
        run: dnf -y --setopt=keepcache=1 install clang zlib-devel libicu findutils curl file

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish (self-contained, Native AOT)
        run: >
          dotnet publish AcerHelper.csproj
          -c Release
          -f net10.0
          -r linux-x64
          --self-contained true
          -p:PublishAot=true
          -o publish-linux

      # AppImage: bundle the whole AOT output (native AcerHelper + libSkiaSharp.so / libHarfBuzzSharp.so —
      # not single-file, like the Windows AOT publish; drop the .dbg/.pdb) plus the udev rules (installed on
      # first run via the in-app pkexec). appimagetool with --appimage-extract-and-run (no FUSE in the container).
      - name: Build AppImage
        run: |
          rm -f publish-linux/*.dbg publish-linux/*.pdb
          AD=AcerHelper.AppDir
          mkdir -p "$AD"
          cp -a publish-linux/. "$AD/"
          chmod +x "$AD/AcerHelper"
          install -m0755 packaging/AppRun "$AD/AppRun"
          cp packaging/acer-helper.desktop "$AD/"
          cp packaging/acer-helper.png "$AD/"
          cp packaging/60-acer-helper.rules packaging/acer-helper.conf "$AD/"
          # Reuse the cached appimagetool if the cache restored it; otherwise fetch it.
          [ -x appimagetool ] || curl -fsSL -o appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run "$AD" AcerHelper-x86_64.AppImage

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: AcerHelper-x86_64.AppImage
