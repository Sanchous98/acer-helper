name: windows

# Windows build: the standalone Native-AOT AcerHelper.exe + a WiX MSI installer.
#
# Native AOT is safe here: WMI is reached via source-generated COM interop ([GeneratedComInterface],
# raw VARIANT/SAFEARRAY), NOT System.Management — whose classic runtime-IL-stub COM interop AOT cannot do.
# The AOT analyzer is clean (0 IL30xx); Avalonia compiled bindings + CommunityToolkit.Mvvm source-gen are
# trim/AOT-safe; the windows-2022 runner ships the MSVC C++ toolchain the ILC compiler links with.
# (PublishAot=true also disables single-file — they're mutually exclusive; see csproj.)
#
# WiX runs on Windows only (it can't build an MSI on Linux — hence a separate per-OS workflow, not one
# cross-platform job). WiX 5 is pinned to avoid the paid OSMF-EULA that WiX 6/7 require.

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: AcerHelper.exe + MSI
    runs-on: windows-2022
    permissions:
      contents: write        # create/attach to the GitHub Release on a version tag
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish (self-contained, Native AOT)
        run: >
          dotnet publish AcerHelper.csproj
          -c Release
          -f net10.0-windows
          -r win-x64
          --self-contained true
          -p:PublishAot=true
          -o publish

      # Native AOT + Avalonia is NOT single-file: Skia/HarfBuzz/ANGLE ship as native DLLs next to the exe
      # (libSkiaSharp.dll, libHarfBuzzSharp.dll, av_libGLESv2.dll, libEGL.dll, …). The exe P/Invokes them, so
      # the whole folder is the artifact; drop the .pdb from what we ship.
      - name: Upload standalone app
        uses: actions/upload-artifact@v7
        with:
          name: AcerHelper-win-x64
          path: |
            publish/
            !publish/**/*.pdb
          if-no-files-found: error

      # Installer: WiX MSI (packaging/AcerHelper.wxs). Harvests the publish/ folder into Program Files +
      # a Start-menu shortcut + uninstaller. Version read from the csproj.
      - name: Build MSI (WiX)
        shell: pwsh
        run: |
          Remove-Item publish\*.pdb -ErrorAction SilentlyContinue
          dotnet tool install --global wix --version 5.0.2
          $ver = [regex]::Match((Get-Content AcerHelper.csproj -Raw), '<Version>([^<]+)').Groups[1].Value
          wix build packaging\AcerHelper.wxs -arch x64 -d Version=$ver -d PublishDir=publish -o AcerHelper-Setup.msi

      - name: Upload MSI
        uses: actions/upload-artifact@v7
        with:
          name: AcerHelper-Setup
          path: AcerHelper-Setup.msi
          if-no-files-found: error

      # On a version tag (v*), publish the MSI to the GitHub Release for that tag — this is the feed the
      # in-app update check (UpdateChecker) reads. The Linux workflow appends the RPM to the same release.
      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: AcerHelper-Setup.msi
