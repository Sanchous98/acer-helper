name: acer-helper

# Builds the Acer Helper tray app (C# / .NET 10, Avalonia UI) as a STANDALONE
# Native-AOT, self-contained .exe — no .NET runtime install needed on the target.
# AOT native compilation must run on Windows (cross-OS AOT is unsupported); the
# windows-2022 runner ships the MSVC toolchain (link.exe) AOT needs.

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Build standalone AcerHelper.exe
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish (Native AOT, self-contained)
        run: >
          dotnet publish AcerHelper.csproj
          -c Release
          -f net10.0-windows
          -r win-x64
          --self-contained true
          -p:PublishAot=true
          -o publish

      - name: List output
        shell: cmd
        run: dir publish

      - name: Upload standalone exe
        uses: actions/upload-artifact@v7
        with:
          name: AcerHelper-aot-win-x64
          path: publish/AcerHelper.exe
          if-no-files-found: error
