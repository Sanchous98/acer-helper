name: acer-helper

# Builds the Acer Helper tray app (C# / .NET 10, Avalonia UI) as a STANDALONE, self-contained,
# Native AOT .exe — no .NET runtime install needed on the target, no JIT warm-up.
#
# Native AOT is safe here: WMI is reached via source-generated COM interop ([GeneratedComInterface],
# raw VARIANT/SAFEARRAY), NOT System.Management — whose classic runtime-IL-stub COM interop AOT
# cannot do. The AOT analyzer is clean (dotnet build -p:EnableAotAnalyzer=true -> 0 IL30xx), and
# Avalonia compiled bindings + CommunityToolkit.Mvvm source-gen are trim/AOT-safe. The windows-2022
# runner ships the MSVC C++ toolchain that the ILC compiler needs to link the native image.
# (Setting PublishAot=true also disables single-file packaging — they're mutually exclusive; see csproj.)
#
# The linux-rpm job builds the Linux distributable: a self-contained single-file binary packaged as an RPM
# that ALSO ships the udev/tmpfiles permission rules (packaging/), so installing the package is what grants
# the app unprivileged access to the root-only laptop-control sysfs knobs — no hand-run scripts.

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Build standalone AcerHelper.exe
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish (self-contained, Native AOT)
        run: >
          dotnet publish AcerHelper.csproj
          -c Release
          -f net10.0-windows
          -r win-x64
          --self-contained true
          -p:PublishAot=true
          -o publish

      - name: List output
        shell: cmd
        run: dir publish

      # Native AOT + Avalonia is NOT a single file: Skia/HarfBuzz/ANGLE ship as native DLLs next to the
      # exe (av_libGLESv2.dll, libEGL.dll, libSkiaSharp.dll, libHarfBuzzSharp.dll, ...). The exe P/Invokes
      # them, so the artifact must be the WHOLE publish folder — uploading only the .exe makes it crash on
      # launch with a missing-native-DLL error.
      - name: Upload standalone app
        uses: actions/upload-artifact@v7
        with:
          name: AcerHelper-win-x64
          # Whole folder (exe + native Skia/HarfBuzz/ANGLE DLLs), but drop debug symbols from the release.
          path: |
            publish/
            !publish/**/*.pdb
          if-no-files-found: error

  linux-rpm:
    name: Build Linux RPM (with udev rules)
    runs-on: ubuntu-latest
    container: fedora:41
    steps:
      - uses: actions/checkout@v7

      # setup-dotnet downloads the SDK; the .NET runtime needs ICU. rpm-build + systemd-rpm-macros give
      # rpmbuild and the %{_udevrulesdir}/%{_tmpfilesdir} macros the spec uses.
      - name: Install build deps
        run: dnf -y install rpm-build systemd-rpm-macros libicu tar gzip findutils

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish (self-contained single-file, JIT)
        run: >
          dotnet publish AcerHelper.csproj
          -c Release
          -f net10.0
          -r linux-x64
          --self-contained true
          -p:PublishSingleFile=true
          -o publish-linux

      - name: Assemble RPM sources
        run: |
          VER=$(grep -oPm1 '(?<=<Version>)[^<]+' AcerHelper.csproj)
          echo "VER=$VER" >> "$GITHUB_ENV"
          mkdir -p ~/rpmbuild/SOURCES
          rm -f publish-linux/*.pdb
          tar -czf ~/rpmbuild/SOURCES/acer-helper-"$VER"-linux-x64.tar.gz -C publish-linux .
          cp packaging/60-acer-helper.rules packaging/acer-helper.conf packaging/acer-helper.desktop ~/rpmbuild/SOURCES/

      - name: Build RPM
        run: rpmbuild -bb --define "appversion $VER" packaging/acer-helper.spec

      - name: Upload RPM
        uses: actions/upload-artifact@v7
        with:
          name: acer-helper-rpm
          path: ~/rpmbuild/RPMS/*/*.rpm
          if-no-files-found: error
