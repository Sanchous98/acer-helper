name: acer-helper

# Builds the Acer Helper tray app (C# / .NET 10, Avalonia UI) as a STANDALONE,
# self-contained, single-file .exe — no .NET runtime install needed on the target.
#
# JIT (not Native AOT) on purpose: the Acer features use System.Management (WMI), whose
# COM/late-binding Native AOT does not support reliably — under AOT the WMI calls fail at
# runtime and all Acer functionality is lost. JIT keeps WMI working. (csproj still carries
# the AOT settings for later; re-enable by adding -p:PublishAot=true once WMI-AOT is verified.)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Build standalone AcerHelper.exe
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish (self-contained single-file, JIT — WMI-safe)
        run: >
          dotnet publish AcerHelper.csproj
          -c Release
          -f net10.0-windows
          -r win-x64
          --self-contained true
          -o publish

      - name: List output
        shell: cmd
        run: dir publish

      - name: Upload standalone exe
        uses: actions/upload-artifact@v7
        with:
          name: AcerHelper-win-x64
          path: publish/AcerHelper.exe
          if-no-files-found: error
